services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: import_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d import_service"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "54329:5432"

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: import_user
      RABBITMQ_DEFAULT_PASS: import_password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "56729:5672"

  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
      ]
    env_file:
      - .env.example
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build: .
    command:
      [
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=1",
      ]
    env_file:
      - .env.example
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.celery_app:celery_app inspect ping -d celery@$$HOSTNAME",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
