services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: import_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d import_service"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "${POSTGRES_HOST_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    stop_grace_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: import_user
      RABBITMQ_DEFAULT_PASS: import_password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "${RABBITMQ_HOST_PORT:-56729}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15629}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    stop_grace_period: 20s

  migrate:
    image: fastapi_technical_assessment-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/scripts/run_migrations.sh"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/import_service
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: fastapi_technical_assessment-app
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
      ]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/import_service
      RABBITMQ_URL: amqp://import_user:import_password@rabbitmq:5672//
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 20s

  worker:
    image: fastapi_technical_assessment-app
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=1",
      ]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/import_service
      RABBITMQ_URL: amqp://import_user:import_password@rabbitmq:5672//
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.celery_app:celery_app inspect ping -d celery@$$HOSTNAME",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s


  outbox_publisher:
    image: fastapi_technical_assessment-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.outbox.services.publish_outbox"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/import_service
      RABBITMQ_URL: amqp://import_user:import_password@rabbitmq:5672//
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  beat:
    image: fastapi_technical_assessment-app
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "beat",
        "--loglevel=INFO",
      ]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/import_service
      RABBITMQ_URL: amqp://import_user:import_password@rabbitmq:5672//
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  postgres_data:
  rabbitmq_data:
